global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: churn-local
    environment: dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: churn-api
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - churn-api:8000
        labels:
          service: churn-api
          component: ml-inference
